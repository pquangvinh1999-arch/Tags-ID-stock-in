<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WHMPRO | By Vinh </title>
    
    <!-- PWA CONFIG -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: #f8fafc; overflow-x: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; }
        .scanner-window { overflow: hidden; border: 2px solid #6366f1; box-shadow: 0 0 20px rgba(99, 102, 241, 0.3); position: relative; }
        .scanner-window::after { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: #ef4444; box-shadow: 0 0 15px #ef4444; animation: scanning 2s infinite linear; z-index: 10; }
        @keyframes scanning { 0% { top: 0%; } 50% { top: 100%; } 100% { top: 0%; } }
        .btn-primary { background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .success-pulse { animation: success-flash 0.5s ease-out; }
        @keyframes success-flash { 0% { background: rgba(16, 185, 129, 0); } 50% { background: rgba(16, 185, 129, 0.2); } 100% { background: rgba(16, 185, 129, 0); } }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.5); border-radius: 10px; }
        .location-locked { border-color: #10b981 !important; box-shadow: 0 0 15px rgba(16, 185, 129, 0.3); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <!-- NÚT CÀI ĐẶT APP -->
    <div id="install-banner" class="fixed top-4 right-4 z-50 hidden">
        <button onclick="installPWA()" class="bg-indigo-500 text-white px-4 py-2 rounded-full text-xs font-bold shadow-xl flex items-center gap-2 animate-bounce">
            <span>📥 Cài Đặt App</span>
        </button>
    </div>

    <header class="w-full max-w-md mb-6 flex justify-between items-center px-2">
        <div>
            <h1 class="text-xl font-black tracking-tight text-white">WHMPRO <span class="text-indigo-400">SCAN</span></h1>
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">HỆ THỐNG QUÉT MÃ VẠCH</p>
        </div>
        <div id="connection-status" class="h-3 w-3 rounded-full bg-emerald-500 shadow-[0_0_10px_#10b981]"></div>
    </header>

    <main class="w-full max-w-md space-y-4 pb-10">
        
        <!-- 1. MÁY QUÉT LÊN ĐẦU -->
        <div class="glass-card p-2 relative" id="main-container">
            <div id="reader" class="scanner-window rounded-2xl aspect-square bg-black"></div>
        </div>

        <!-- 2. KHU VỰC NHẬP LIỆU (Vị trí & Tag ID) -->
        <div class="glass-card p-6 space-y-4">
            <!-- Ô Vị Trí -->
            <div class="space-y-2">
                <div class="flex justify-between items-center">
                    <label class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Vị trí kho (Bin/Location)</label>
                    <button onclick="unlockLocation()" id="btn-unlock" class="hidden text-[10px] bg-white/10 hover:bg-white/20 text-indigo-300 px-2 py-1 rounded-lg font-bold transition">🔄 Đổi vị trí</button>
                </div>
                <div class="flex gap-2">
                    <input type="text" id="location-input" placeholder="Quét hoặc nhập vị trí..." 
                           class="flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm font-bold text-white outline-none focus:border-indigo-500 transition">
                    <button onclick="lockLocation()" id="btn-lock" class="bg-indigo-600 px-4 rounded-xl text-xs font-bold text-white">KHÓA</button>
                </div>
            </div>

            <!-- Ô Tag ID (Chỉ active khi vị trí đã khóa) -->
            <div class="space-y-2">
                <label class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Tag ID sản phẩm</label>
                <input type="text" id="tagid-input" placeholder="Khóa vị trí để nhập Tag ID..." 
                       disabled
                       onkeydown="handleTagEnter(event)"
                       class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm font-bold text-white outline-none focus:border-indigo-500 transition disabled:opacity-30 disabled:cursor-not-allowed">
            </div>

            <button onclick="toggleScanner()" id="btn-control" class="btn-primary w-full py-4 rounded-2xl font-extrabold text-white shadow-lg shadow-indigo-500/20">
                ⚡ BẬT MÁY QUÉT
            </button>
        </div>

        <!-- 3. THÔNG TIN TRẠNG THÁI -->
        <div class="glass-card p-6 space-y-4">
            <div class="text-center py-2 border-b border-white/10">
                <p id="scan-mode-text" class="text-slate-400 text-xs font-bold uppercase mb-1">Vui lòng chọn vị trí trước</p>
                <h2 id="scanned-result" class="text-2xl font-black tracking-wider text-indigo-300">SẴN SÀNG...</h2>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div class="bg-white/5 p-3 rounded-xl border border-white/5 text-center">
                    <p class="text-[9px] text-slate-500 uppercase font-bold">Lần cuối</p>
                    <p id="last-time" class="text-xs font-bold text-slate-200">--:--:--</p>
                </div>
                <div class="bg-white/5 p-3 rounded-xl border border-white/5 text-center">
                    <p class="text-[9px] text-slate-500 uppercase font-bold">Tổng Tags ID</p>
                    <p id="scan-count" class="text-xs font-bold text-slate-200">0 Tags ID</p>
                </div>
            </div>
        </div>

        <!-- 4. DANH SÁCH CHỜ -->
        <div class="glass-card p-4 space-y-3">
            <div class="flex justify-between items-center border-b border-white/10 pb-2">
                <h3 class="text-[11px] font-bold text-slate-400 uppercase">Danh sách chờ đồng bộ</h3>
            </div>
            <div id="history-list" class="max-h-60 overflow-y-auto pr-1 custom-scrollbar space-y-2">
                <div class="text-center text-[10px] text-slate-600 italic py-2">Chưa có mã nào được quét...</div>
            </div>
            <button onclick="syncToServer()" id="btn-sync" class="w-full bg-emerald-500 hover:bg-emerald-600 transition-colors py-3 rounded-xl font-extrabold text-white shadow-lg shadow-emerald-500/20 mt-2">
                ☁️ NHẬP DỮ LIỆU
            </button>
        </div>
    </main>

    <audio id="beep-sound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" preload="auto"></audio>

    <script>
        // --- PWA ---
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-banner').style.display = 'block';
        });
        async function installPWA() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                deferredPrompt = null;
                document.getElementById('install-banner').style.display = 'none';
            }
        }

        // --- LOGIC QUÉT MÃ & NHẬP LIỆU ---
        let html5QrCode;
        let isScanning = false;
        let scannedDataArray = []; 
        let currentLocation = "";
        let isLocationLocked = false;
        const beep = document.getElementById('beep-sound');
        let lastDecodedText = "";
        let matchCount = 0;
        
        const CLOUD_API = 'https://script.google.com/macros/s/AKfycbyMECd-im1zwQJ8TQEgDbJF3O6go4uQLSl9UoIoTxnQjgY9WbufHwt8JWkyhVOPBKgn/exec';

        function lockLocation() {
            const input = document.getElementById('location-input');
            const tagInput = document.getElementById('tagid-input');
            if (input.value.trim() === "") {
                alert("Vui lòng quét hoặc nhập vị trí!");
                return;
            }
            currentLocation = input.value.trim();
            isLocationLocked = true;
            
            input.readOnly = true;
            input.classList.add('location-locked');
            document.getElementById('btn-lock').classList.add('hidden');
            document.getElementById('btn-unlock').classList.remove('hidden');
            
            // Tự động nhảy sang ô Tag ID và focus
            tagInput.disabled = false;
            tagInput.focus();
            
            document.getElementById('scan-mode-text').innerText = "ĐANG QUÉT TAG ID CHO: " + currentLocation;
            document.getElementById('scan-mode-text').classList.replace('text-slate-400', 'text-emerald-400');
        }

        function unlockLocation() {
            isLocationLocked = false;
            const input = document.getElementById('location-input');
            const tagInput = document.getElementById('tagid-input');
            input.readOnly = false;
            input.classList.remove('location-locked');
            document.getElementById('btn-lock').classList.remove('hidden');
            document.getElementById('btn-unlock').classList.add('hidden');
            
            tagInput.disabled = true;
            tagInput.value = "";
            input.focus();
            
            document.getElementById('scan-mode-text').innerText = "Vui lòng chọn vị trí trước";
            document.getElementById('scan-mode-text').classList.replace('text-emerald-400', 'text-slate-400');
        }

        // Xử lý nhấn Enter khi nhập tay Tag ID
        function handleTagEnter(event) {
            if (event.key === 'Enter') {
                const val = event.target.value.trim();
                if (val !== "") {
                    processFinalTag(val);
                    event.target.value = ""; // Xóa ô nhập sau khi xong
                }
            }
        }

        async function toggleScanner() {
            if (isScanning) { await stopScanner(); } else { await startScanner(); }
        }

        async function startScanner() {
            const btn = document.getElementById('btn-control');
            html5QrCode = new Html5Qrcode("reader");
            const config = { 
                fps: 10, 
                qrbox: { width: 250, height: 150 }, 
                experimentalFeatures: { useBarCodeDetectorIfSupported: true }
            };
            try {
                await html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);
                isScanning = true;
                btn.innerText = "🛑 DỪNG QUÉT";
                btn.classList.replace('btn-primary', 'bg-red-500');
            } catch (err) { alert("Không tìm thấy Camera!"); }
        }

        async function stopScanner() {
            if (html5QrCode) {
                await html5QrCode.stop();
                isScanning = false;
                document.getElementById('btn-control').innerText = "⚡ KÍCH HOẠT MÁY QUÉT";
                document.getElementById('btn-control').classList.replace('bg-red-500', 'btn-primary');
            }
        }

        function onScanSuccess(decodedText) {
            const activeEl = document.activeElement;

            // 1. Nếu đang focus vào ô vị trí (hoặc chưa khóa vị trí) -> Điền vào vị trí
            if (!isLocationLocked || activeEl.id === 'location-input') {
                document.getElementById('location-input').value = decodedText;
                lockLocation();
                beep.play();
                return;
            }

            // 2. Nếu đang focus vào ô Tag ID (hoặc đã khóa vị trí) -> Quét Tag ID
            if (decodedText === lastDecodedText) { matchCount++; } else { lastDecodedText = decodedText; matchCount = 1; }
            
            if (matchCount >= 2) {
                html5QrCode.pause();
                beep.play();
                if (navigator.vibrate) navigator.vibrate(150);
                document.getElementById('main-container').classList.add('success-pulse');
                setTimeout(() => document.getElementById('main-container').classList.remove('success-pulse'), 500);
                
                processFinalTag(decodedText);
                
                matchCount = 0;
                lastDecodedText = "";
                setTimeout(() => {
                    if (isScanning) html5QrCode.resume();
                    document.getElementById('scanned-result').innerText = "ĐANG CHỜ MÃ...";
                }, 1500);
            }
        }

        // Hàm xử lý chung khi một Tag ID được xác nhận (từ quét hoặc nhập tay)
        function processFinalTag(tagID) {
            beep.play();
            if (navigator.vibrate) navigator.vibrate(150);
            
            const currentTime = new Date().toLocaleTimeString('vi-VN');
            document.getElementById('scanned-result').innerText = tagID;
            document.getElementById('last-time').innerText = currentTime;
            
            const fullDateTime = new Date().toLocaleString('vi-VN'); 
            scannedDataArray.push({ 
                location: currentLocation, 
                barcode: tagID, 
                time: fullDateTime 
            });
            
            updateListUI();
        }

        function updateListUI() {
            const listContainer = document.getElementById('history-list');
            document.getElementById('scan-count').innerText = scannedDataArray.length + " Tags ID";
            listContainer.innerHTML = ''; 
            for (let i = scannedDataArray.length - 1; i >= 0; i--) {
                const item = scannedDataArray[i];
                listContainer.innerHTML += `
                    <div class="flex justify-between items-center bg-white/5 p-2 rounded-lg border border-white/10 text-[11px] gap-2">
                        <div class="flex-1 overflow-hidden">
                            <div class="text-indigo-300 font-bold tracking-wide truncate">
                                <span class="text-emerald-400">[${item.location}]</span> ${item.barcode}
                            </div>
                            <div class="text-slate-400 font-medium text-[9px]">${item.time.split(' ')[0]}</div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="editItem(${i})" class="p-1.5 bg-blue-500/20 text-blue-400 rounded hover:bg-blue-500/40 transition">✏️</button>
                            <button onclick="deleteItem(${i})" class="p-1.5 bg-red-500/20 text-red-400 rounded hover:bg-red-500/40 transition">❌</button>
                        </div>
                    </div>
                `;
            }
            if (scannedDataArray.length === 0) {
                listContainer.innerHTML = '<div class="text-center text-[10px] text-slate-600 italic py-2">Chưa có mã nào được quét...</div>';
            }
        }

        function editItem(index) {
            const item = scannedDataArray[index];
            const newLoc = prompt("Sửa Vị Trí (Bin):", item.location);
            if (newLoc === null) return;
            const newBarcode = prompt("Sửa Tag ID:", item.barcode);
            if (newBarcode === null) return;
            scannedDataArray[index].location = newLoc.trim();
            scannedDataArray[index].barcode = newBarcode.trim();
            updateListUI();
        }

        function deleteItem(index) {
            if (confirm("Có chắc chắn xóa muốn Tag ID này không?")) {
                scannedDataArray.splice(index, 1);
                updateListUI();
            }
        }

        async function syncToServer() {
            if (scannedDataArray.length === 0) { alert("Chưa có mã nào để đồng bộ!"); return; }
            const btnSync = document.getElementById('btn-sync');
            btnSync.innerHTML = "⏳ ĐANG GỬI DỮ LIỆU...";
            btnSync.disabled = true;
            try {
                const response = await fetch(CLOUD_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ 
                        action: "receive_mobile", 
                        data: scannedDataArray 
                    })
                });
                const result = await response.json();
                if (result.status === "success") {
                    alert("✅ Đã nhập thành công " + result.count + " Tags ID!");
                    scannedDataArray = [];
                    updateListUI();
                } else { alert("❌ Lỗi Server: " + result.message); }
            } catch (error) { alert("❌ Lỗi mạng: " + error); } finally {
                btnSync.innerHTML = "☁️ NHẬP DỮ LIỆU";
                btnSync.disabled = false;
            }
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log('SW error:', err));
            });
        }
    </script>
</body>
</html>
